<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyra. HOU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: #ffffff;
            font-family: sans-serif;
        }

        /* ========== 开场动画覆盖层 ========== */
        #introOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 1000;
        }

        .skip-btn {
            position: absolute; top: 20px; right: 30px;
            font-size: 16px; color: #aaa; cursor: pointer;
            z-index: 1100; user-select: none;
            transition: color 0.2s;
        }
        .skip-btn:hover { color: #333; }

        /* 门线：一条从无到有的竖线，位于右侧 */
        .door-line {
            position: absolute;
            left: 75%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 1px;
            height: 0;
            background: #000;
            transition: height 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 20;
        }

        /* 门右侧白色遮罩，遮挡字母的右半部分 */
        .door-mask {
            position: absolute;
            left: 75%;
            top: 0;
            width: 25vw;
            height: 100%;
            background: #ffffff;
            z-index: 15;
        }

        /* 动画元素容器 */
        .anim-letters {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
        }

        .anim-letter {
            position: absolute;
            font-size: 80px;
            line-height: 1;
            white-space: nowrap;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.4s;
        }

        .cyra-font { font-family: 'Lobster', cursive; }
        .hou-font  { font-family: 'Climate Crisis', sans-serif; }

        /* 黑点动画元素 */
        .anim-dot {
            position: absolute;
            width: 26px; height: 26px;
            background: #000;
            border-radius: 50%;
            z-index: 25;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                        left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                        top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ========== 主内容区（初始隐藏） ========== */
        #mainContent {
            opacity: 0;
            transition: opacity 0.3s;
            display: flex; align-items: center; justify-content: center;
            height: 100%;
        }
        #mainContent.visible { opacity: 1; }

        .name-container {
            display: flex; align-items: center; gap: 14px;
            font-size: 80px; user-select: none;
        }

        .cyra { font-family: 'Lobster', cursive; }
        .hou  { font-family: 'Climate Crisis', sans-serif; }

        .letter {
            display: inline-block;
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1),
                        opacity 0.4s ease;
            cursor: pointer;
        }

        .name-container:not(.magic-active):hover .letter:not(:hover) {
            opacity: 0.2;
        }
        .name-container:not(.magic-active):hover .letter:hover {
            transform: translateY(-16px);
        }
        .name-container.magic-active .letter {
            opacity: 0; pointer-events: none;
        }

        .cube-dot {
            width: 26px; height: 26px;
            background: #000; border-radius: 50%;
            cursor: pointer; position: relative; z-index: 15;
            transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 0 0 6px transparent;
        }
        .cube-dot.active {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50vmin; height: 50vmin;
            background: transparent; border-radius: 0;
            cursor: grab; z-index: 200;
            box-shadow: 0 0 0 12px transparent;
        }
        .cube-dot.active:active { cursor: grabbing; }
        .cube-dot canvas { display: block; width: 100%; height: 100%; }

        .top-nav {
            position: fixed; top: -80px; left: 0;
            width: 100%; height: 70px;
            background: rgba(255,255,255,0.96);
            display: flex; align-items: center; justify-content: center;
            gap: 42px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: top 0.45s ease;
            z-index: 100;
        }
        .top-nav.active { top: 0; }
        .top-nav a {
            text-decoration: none; font-size: 18px;
            color: #1a1a1a; font-family: system-ui, sans-serif;
            transition: color 0.2s;
        }
        .top-nav a:hover { color: #444; }
        .cube-dot.active ~ .top-nav { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <!-- 开场动画层 -->
    <div id="introOverlay">
        <div class="skip-btn" id="skipBtn">skip</div>
        <div class="door-line" id="doorLine"></div>
        <div class="door-mask" id="doorMask"></div>
        <div class="anim-letters" id="animLetters"></div>
    </div>

    <!-- 主内容区 -->
    <div id="mainContent">
        <div class="top-nav" id="topNav">
            <a href="index.html">Home</a>
            <a href="about.html">About me</a>
            <a href="work-experience.html">Work Experience</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="others.html">Others</a>
            <a href="contact.html">Contact me</a>
        </div>

        <div class="name-container" id="nameContainer">
            <div class="cyra" id="cyraGroup">
                <span class="letter">C</span><span class="letter">y</span><span class="letter">r</span><span class="letter">a</span>
            </div>
            <div class="cube-dot" id="cubeDot"></div>
            <div class="hou" id="houGroup">
                <span class="letter">H</span><span class="letter">O</span><span class="letter">U</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ========== 开场动画逻辑（方案B） ==========
        (function() {
            const overlay = document.getElementById('introOverlay');
            const skipBtn = document.getElementById('skipBtn');
            const doorLine = document.getElementById('doorLine');
            const doorMask = document.getElementById('doorMask');
            const animContainer = document.getElementById('animLetters');
            const mainContent = document.getElementById('mainContent');
            let introTimer = null;

            function endIntro() {
                if (introTimer) clearTimeout(introTimer);
                overlay.style.display = 'none';
                mainContent.classList.add('visible');
                initCubeInteraction();
                initLetterClick();
            }

            skipBtn.addEventListener('click', endIntro);

            function startAnimation() {
                // 阶段1：右侧竖线从无到有，高度320px（覆盖四个字母总高）
                doorLine.style.height = '320px';

                setTimeout(() => {
                    // 创建字母元素
                    const cyraData = [
                        { char: 'c', font: 'cyra-font' },
                        { char: 'y', font: 'cyra-font' },
                        { char: 'r', font: 'cyra-font' },
                        { char: 'a', font: 'cyra-font' }
                    ];
                    const houData = [
                        { char: 'H', font: 'hou-font' },
                        { char: 'O', font: 'hou-font' },
                        { char: 'U', font: 'hou-font' }
                    ];

                    // 辅助函数：延迟
                    const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

                    // 创建cyra字母元素，初始位于门右侧（遮罩下）
                    const cyraEls = cyraData.map((data, i) => {
                        const el = document.createElement('span');
                        el.className = `anim-letter ${data.font}`;
                        el.textContent = data.char;
                        // 竖向排列：从下往上，top 基于门中心
                        el.style.top = `calc(50% + ${(i - 1.5) * 80}px)`;
                        el.style.left = '75%'; // 门线位置
                        el.style.transform = 'translateX(30px)'; // 初始在门右侧，被遮罩挡住
                        el.style.opacity = '0';
                        animContainer.appendChild(el);
                        return el;
                    });

                    // 创建HOU字母元素，同样初始在门右侧
                    const houEls = houData.map((data, i) => {
                        const el = document.createElement('span');
                        el.className = `anim-letter ${data.font}`;
                        el.textContent = data.char;
                        el.style.top = `calc(50% + ${(i - 1) * 80}px)`;
                        el.style.left = '75%';
                        el.style.transform = 'translateX(30px)';
                        el.style.opacity = '0';
                        animContainer.appendChild(el);
                        return el;
                    });

                    // 黑点元素
                    const dotEl = document.createElement('div');
                    dotEl.className = 'anim-dot';
                    dotEl.style.top = '50%';
                    dotEl.style.left = '75%';
                    dotEl.style.transform = 'translate(-50%, -50%) scale(0)';
                    animContainer.appendChild(dotEl);

                    // 阶段2：cyra依次探头露出一半
                    async function peekCyra() {
                        for (let i = 0; i < 4; i++) {
                            const el = cyraEls[i];
                            el.style.opacity = '1';
                            // 向左滑出，露出一半（字母宽度一半约25px）
                            el.style.transform = 'translateX(-25px)';
                            await delay(400);
                        }
                    }

                    // 阶段3：cyra依次跳出到flex布局位置（屏幕中央偏左）
                    async function jumpCyra() {
                        for (let i = 0; i < 4; i++) {
                            const el = cyraEls[i];
                            // 跳出：最终位置大约 left: 35%, top 根据索引调整（模拟flex居中）
                            el.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                            el.style.left = '35%';
                            el.style.top = `calc(50% + ${(i - 1.5) * 80}px)`;
                            el.style.transform = 'translateX(0)';
                            await delay(300);
                        }
                    }

                    // 阶段4：HOU一起从门后滑出，完全离开门线后跳走
                    async function jumpHou() {
                        // 一起滑出到门左侧（完全可见）
                        for (let el of houEls) {
                            el.style.opacity = '1';
                            el.style.transform = 'translateX(-80px)'; // 完全到门左侧
                        }
                        await delay(400);
                        // 然后跳走
                        for (let i = 0; i < 3; i++) {
                            houEls[i].style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                            houEls[i].style.left = '65%';
                            houEls[i].style.top = `calc(50% + ${(i - 1) * 80}px)`;
                            houEls[i].style.transform = 'translateX(0)';
                        }
                        await delay(600);
                    }

                    // 阶段5：黑点滚出推开字母，门线消失
                    async function finalPush() {
                        // 黑点从门位置出现并移动到两字母组中间
                        dotEl.style.transform = 'translate(-50%, -50%) scale(1)';
                        dotEl.style.left = '50%'; // 移动到屏幕中央
                        await delay(400);
                        // 推开：cyra更左，hou更右
                        for (let el of cyraEls) {
                            el.style.left = '30%';
                        }
                        for (let el of houEls) {
                            el.style.left = '70%';
                        }
                        // 门线消失
                        doorLine.style.opacity = '0';
                        doorMask.style.opacity = '0';
                        await delay(300);
                        endIntro();
                    }

                    // 执行序列
                    (async () => {
                        await peekCyra();
                        await delay(200);
                        await jumpCyra();
                        await delay(100);
                        await jumpHou();
                        await delay(200);
                        await finalPush();
                    })();

                }, 600); // 等待门线动画完成
            }

            startAnimation();
        })();

        // ========== 字母点击跳转 About me ==========
        function initLetterClick() {
            const letters = document.querySelectorAll('.letter');
            letters.forEach(letter => {
                letter.removeEventListener('click', letterClickHandler);
                letter.addEventListener('click', letterClickHandler);
            });
        }

        function letterClickHandler(e) {
            e.stopPropagation();
            window.location.href = 'about.html';
        }

        // ========== 魔方交互（右键/双击跳转 Portfolio） ==========
        function initCubeInteraction() {
            const dot = document.getElementById('cubeDot');
            const container = document.getElementById('nameContainer');
            if (dot.dataset.initialized === 'true') return;
            dot.dataset.initialized = 'true';

            // 强制重置黑点尺寸（覆盖动画残留）
            dot.style.width = '26px';
            dot.style.height = '26px';
            dot.style.margin = '0';

            let active = false;
            let transitioning = false;
            let scene, camera, renderer, controls, animId;
            let cleanupFunc = null;

            function activate() {
                if (active || transitioning) return;
                transitioning = true;
                active = true;
                dot.classList.add('active');
                container.classList.add('magic-active');
                dot.removeEventListener('mouseleave', deactivate);
                dot.addEventListener('transitionend', onTransitionEnd, { once: true });
            }

            function deactivate() {
                if (transitioning || !active) return;
                active = false;
                dot.classList.remove('active');
                container.classList.remove('magic-active');
                destroyScene();
                dot.addEventListener('mouseleave', deactivate);
            }

            function onTransitionEnd() {
                transitioning = false;
                if (!active) return;
                // 等待一帧确保布局稳定
                requestAnimationFrame(() => {
                    const size = dot.clientWidth;
                    if (size === 0 || size < 10) return; // 忽略无效尺寸

                    scene = new THREE.Scene();
                    scene.background = null;
                    camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
                    camera.position.set(2.2, 1.8, 3.2);
                    camera.lookAt(0,0,0);
                    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setSize(size, size);
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    dot.appendChild(renderer.domElement);

                    controls = new THREE.OrbitControls(camera, renderer.domElement);
                    controls.enableZoom = false;
                    controls.enablePan = false;
                    controls.rotateSpeed = 0.5;
                    controls.autoRotate = true;
                    controls.autoRotateSpeed = 0.8;
                    controls.target.set(0,0,0);
                    controls.enableDblClick = false;
                    controls.update();

                    const ambient = new THREE.AmbientLight(0xffffff, 0.9);
                    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
                    dir.position.set(5,10,7);
                    scene.add(ambient, dir);

                    const geo = new THREE.BoxGeometry(1,1,1);
                    const colors = [0xFF6B6B,0x4ECDC4,0xFFD93D,0x6C5CE7,0xFF8A5C,0xA29BFE];
                    const materials = colors.map(c => new THREE.MeshStandardMaterial({
                        color: c, roughness: 0.3, metalness: 0.1,
                        emissive: new THREE.Color(c).multiplyScalar(0.15)
                    }));
                    const cubeMesh = new THREE.Mesh(geo, materials);
                    scene.add(cubeMesh);
                    const edges = new THREE.EdgesGeometry(geo);
                    cubeMesh.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0x000000})));

                    function animate() {
                        if (!active) return;
                        animId = requestAnimationFrame(animate);
                        controls.update();
                        renderer.render(scene, camera);
                    }
                    animate();

                    function onContextMenu(e) {
                        e.preventDefault();
                        window.location.href = 'portfolio.html';
                    }
                    function onDblClick() {
                        window.location.href = 'portfolio.html';
                    }

                    renderer.domElement.addEventListener('contextmenu', onContextMenu);
                    renderer.domElement.addEventListener('dblclick', onDblClick);

                    cleanupFunc = () => {
                        try {
                            cancelAnimationFrame(animId);
                            renderer.domElement.removeEventListener('contextmenu', onContextMenu);
                            renderer.domElement.removeEventListener('dblclick', onDblClick);
                            if (renderer.domElement.parentNode) dot.removeChild(renderer.domElement);
                            renderer.dispose();
                            controls.dispose();
                            scene.clear();
                        } catch(e) {} finally {
                            scene = camera = renderer = controls = null;
                        }
                    };
                    dot.addEventListener('mouseleave', deactivate);
                });
            }

            function destroyScene() {
                if (cleanupFunc) { cleanupFunc(); cleanupFunc = null; }
                dot.removeEventListener('transitionend', onTransitionEnd);
                dot.removeEventListener('mouseleave', deactivate);
            }

            dot.addEventListener('mouseenter', activate);
            dot.addEventListener('mouseleave', deactivate);
        }

        // ========== 导航栏逻辑 ==========
        (function(){
            const nav = document.getElementById('topNav');
            let mouseInNav = false;
            document.addEventListener('mousemove', e => {
                if (e.clientY < 20) nav.classList.add('active');
                else if (!mouseInNav) nav.classList.remove('active');
            });
            nav.addEventListener('mouseenter', () => mouseInNav = true);
            nav.addEventListener('mouseleave', () => { mouseInNav = false; nav.classList.remove('active'); });
        })();
    </script>
</body>
</html>
