<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyra. HOU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 名字整体容器 */
    .name-container {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 80px;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 双字体 */
    .cyra { font-family: 'Lobster', cursive; }
    .hou { font-family: 'Climate Crisis', sans-serif; }

    /* 字母+黑点统一过渡 */
    .letter, .dice-dot {
      display: inline-block;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* 小红书核心：悬停字母 → 其他所有+黑点同步变暗 */
    .name-container:hover .letter:not(:hover),
    .name-container:hover .dice-dot {
      opacity: 0.2;
      color: #bbb;
    }

    /* 字母跳动 */
    .letter:hover {
      transform: translateY(-16px);
    }

    /* 中间圆点（小红书原版：平时不转，只点击变形） */
    .dice-dot {
      width: 26px;
      height: 26px;
      background: #000000;
      border-radius: 50%;
      cursor: pointer;
      z-index: 15;
    }

    /* 名字隐藏 */
    .name-container.fade {
      opacity: 0;
      pointer-events: none;
    }

    /* 顶部导航 稳定不闪退 */
    .top-nav {
      position: fixed;
      top: -80px;
      left: 0;
      width: 100%;
      height: 70px;
      background: rgba(255,255,255,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 42px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: top 0.45s ease;
      z-index: 100;
    }
    .top-nav.active { top: 0; }
    .top-nav a {
      text-decoration: none;
      font-size: 18px;
      color: #1a1a1a;
      font-family: system-ui;
    }
    .top-nav a:hover { color: #444; }

    /* 小红书同款丝滑3D圆角魔方 */
    .dice-wrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 280px;
      height: 280px;
      perspective: 1200px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.65s cubic-bezier(0.2, 1, 0.3, 1);
      z-index: 200;
    }
    .dice-wrapper.active {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: all;
    }

    .dice {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.18s ease-out;
    }

    /* 圆角魔方6面 小红书同款柔和质感 */
    .dice-face {
      position: absolute;
      width: 280px;
      height: 280px;
      background: #fff;
      border: 2.5px solid #000;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
    }

    .front  { transform: rotateY(0deg) translateZ(140px); }
    .back   { transform: rotateY(180deg) translateZ(140px); }
    .right  { transform: rotateY(90deg) translateZ(140px); }
    .left   { transform: rotateY(-90deg) translateZ(140px); }
    .top    { transform: rotateX(90deg) translateZ(140px); }
    .bottom { transform: rotateX(-90deg) translateZ(140px); }
  </style>
</head>

<body>
  <div class="top-nav" id="topNav">
    <a href="#home">Home</a>
    <a href="#about">About Me</a>
    <a href="#portfolio">Portfolio</a>
    <a href="#resume">Resume</a>
    <a href="#experience">Experience</a>
    <a href="#contact">Contact</a>
  </div>

  <div class="name-container" id="nameContainer">
    <div class="cyra">
      <span class="letter">C</span>
      <span class="letter">y</span>
      <span class="letter">r</span>
      <span class="letter">a</span>
    </div>
    <div class="dice-dot" id="diceDot"></div>
    <div class="hou">
      <span class="letter">H</span>
      <span class="letter">O</span>
      <span class="letter">U</span>
    </div>
  </div>

  <div class="dice-wrapper" id="diceWrapper">
    <div class="dice" id="dice">
      <div class="dice-face front">Home</div>
      <div class="dice-face back">Contact</div>
      <div class="dice-face right">Portfolio</div>
      <div class="dice-face left">About Me</div>
      <div class="dice-face top">Resume</div>
      <div class="dice-face bottom">Experience</div>
    </div>
  </div>

  <script>
    // 顶部导航逻辑（停留不收回）
    const nav = document.getElementById('topNav');
    let mouseInNav = false;
    document.addEventListener('mousemove', e => {
      if (e.clientY < 20) nav.classList.add('active');
      else if (!mouseInNav) nav.classList.remove('active');
    });
    nav.addEventListener('mouseenter', () => mouseInNav = true);
    nav.addEventListener('mouseleave', () => mouseInNav = false);

    // 小红书核心：点击圆点 → 名字消失+魔方弹出
    const nameBox = document.getElementById('nameContainer');
    const dot = document.getElementById('diceDot');
    const diceWrap = document.getElementById('diceWrapper');

    dot.addEventListener('click', () => {
      nameBox.classList.add('fade');
      diceWrap.classList.add('active');
    });

    // 鼠标无限丝滑跟随魔方旋转（小红书同款缓动）
    let rx = 0, ry = 0;
    document.addEventListener('mousemove', e => {
      if (!diceWrap.classList.contains('active')) return;
      ry = (e.clientX / innerWidth - 0.5) * 50;
      rx = -(e.clientY / innerHeight - 0.5) * 50;
      document.getElementById('dice').style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    });

    // 点击空白返回首页
    document.addEventListener('click', e => {
      if (!diceWrap.classList.contains('active')) return;
      if (!e.target.closest('.dice')) {
        diceWrap.classList.remove('active');
        nameBox.classList.remove('fade');
      }
    });

    // 魔方面跳转
    const linkMap = {
      Home:'#home','About Me':'#about',Portfolio:'#portfolio',
      Resume:'#resume',Experience:'#experience',Contact:'#contact'
    };
    document.querySelectorAll('.dice-face').forEach(face => {
      face.onclick = () => window.location.href = linkMap[face.innerText];
    });
  </script>
</body>
</html>
