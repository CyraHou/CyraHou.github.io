<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyra. HOU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif; /* 后备字体 */
        }

        .name-container {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 80px;
            user-select: none;
        }

        .cyra {
            font-family: 'Lobster', cursive;
        }

        .hou {
            font-family: 'Climate Crisis', sans-serif;
        }

        .letter, .cube-dot {
            display: inline-block;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 核心悬停效果：容器内所有字母和魔方默认不透明，但当任意字母 hover 时，其余字母和魔方变淡 */
        .name-container .letter,
        .name-container .cube-dot {
            opacity: 1;
            transition: opacity 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 当 .name-container 处于 hover 状态（鼠标在任意字母或魔方上）时，
           所有未被 hover 的 .letter 和 .cube-dot 都变淡 */
        .name-container:hover .letter:not(:hover),
        .name-container:hover .cube-dot:not(:hover) {
            opacity: 0.2;
        }

        /* 字母 hover 时向上跳跃 */
        .letter:hover {
            transform: translateY(-16px);
        }

        /* 魔方容器样式，替代原来的黑点 */
        .cube-dot {
            width: 26px;
            height: 26px;
            /* 初始大小与原来黑点一致，内部 canvas 会撑大 */
            cursor: grab;
            z-index: 15;
            position: relative;
        }

        .cube-dot:active {
            cursor: grabbing;
        }

        /* 魔方 hover 时也稍微放大，保留原来感觉 */
        .cube-dot:hover {
            transform: scale(1.3);
        }

        /* 顶部导航栏 */
        .top-nav {
            position: fixed;
            top: -80px;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 42px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: top 0.45s ease;
            z-index: 100;
        }

        .top-nav.active {
            top: 0;
        }

        .top-nav a {
            text-decoration: none;
            font-size: 18px;
            color: #1a1a1a;
            font-family: system-ui, sans-serif;
            transition: color 0.2s;
        }

        .top-nav a:hover {
            color: #444;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-nav" id="topNav">
        <a href="index.html">Home</a>
        <a href="about.html">About me</a>
        <a href="skills.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="others.html">Others</a>
        <a href="contact.html">Contact me</a>
    </div>

    <div class="name-container" id="nameContainer">
        <div class="cyra">
            <span class="letter">C</span>
            <span class="letter">y</span>
            <span class="letter">r</span>
            <span class="letter">a</span>
        </div>
        <!-- 原来的黑点替换为魔方容器 -->
        <div class="cube-dot" id="cubeDot"></div>
        <div class="hou">
            <span class="letter">H</span>
            <span class="letter">O</span>
            <span class="letter">U</span>
        </div>
    </div>

    <!-- 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ---------- 导航栏逻辑（沿用你原来的方案） ----------
        const nav = document.getElementById('topNav');
        let mouseInNav = false;

        document.addEventListener('mousemove', (e) => {
            if (e.clientY < 20) {
                nav.classList.add('active');
            } else if (!mouseInNav) {
                nav.classList.remove('active');
            }
        });

        nav.addEventListener('mouseenter', () => { mouseInNav = true; });
        nav.addEventListener('mouseleave', () => {
            mouseInNav = false;
            nav.classList.remove('active');
        });

        // ---------- 3D 魔方 ----------
        const cubeDot = document.getElementById('cubeDot');
        
        // 设置容器大小（让 canvas 完全填充）
        cubeDot.style.width = '26px';
        cubeDot.style.height = '26px';

        const scene = new THREE.Scene();
        scene.background = null; // 透明背景

        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.set(2.5, 2, 3.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(26, 26);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        cubeDot.appendChild(renderer.domElement);

        // 控制器：可拖拽旋转，不能缩放/平移
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = false;
        controls.enablePan = false;
        controls.rotateSpeed = 0.5;
        controls.target.set(0, 0, 0);
        controls.update();

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // 创建魔方（六个面不同颜色占位）
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const faceColors = [
            0xFF6B6B, // 右 - 珊瑚红
            0x4ECDC4, // 左 - 薄荷绿
            0xFFD93D, // 上 - 明黄
            0x6C5CE7, // 下 - 紫罗兰
            0xFF8A5C, // 前 - 暖橙
            0xA29BFE  // 后 - 浅紫
        ];

        const materials = faceColors.map(color => new THREE.MeshStandardMaterial({
            color: color,
            roughness: 0.3,
            metalness: 0.1,
            emissive: new THREE.Color(color).multiplyScalar(0.15)
        }));

        const cube = new THREE.Mesh(geometry, materials);
        scene.add(cube);

        // 添加黑色边框，更像魔方
        const edgesGeometry = new THREE.EdgesGeometry(geometry);
        const edgesMaterial = new THREE.LineBasicMaterial({ color: 0x000000 });
        const wireframe = new THREE.LineSegments(edgesGeometry, edgesMaterial);
        cube.add(wireframe);

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 点击魔方跳转 About me（区分拖拽与点击）
        let isDragging = false;
        let mouseMoved = false;

        renderer.domElement.addEventListener('mousedown', () => {
            isDragging = true;
            mouseMoved = false;
        });

        window.addEventListener('mousemove', () => {
            if (isDragging) mouseMoved = true;
        });

        window.addEventListener('mouseup', () => {
            if (isDragging && !mouseMoved) {
                window.location.href = 'about.html';
            }
            isDragging = false;
        });

        // 触摸设备支持
        renderer.domElement.addEventListener('touchstart', (e) => {
            isDragging = true;
            mouseMoved = false;
        });

        window.addEventListener('touchmove', () => {
            if (isDragging) mouseMoved = true;
        });

        window.addEventListener('touchend', () => {
            if (isDragging && !mouseMoved) {
                window.location.href = 'about.html';
            }
            isDragging = false;
        });
    </script>
</body>
</html>
