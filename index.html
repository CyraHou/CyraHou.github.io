<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyra. HOU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name-container {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 80px;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .cyra { font-family: 'Lobster', cursive; }
    .hou { font-family: 'Climate Crisis', sans-serif; }

    .letter, .dice-dot {
      display: inline-block;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* 核心：字母hover → 其他字母+黑点一起变淡 */
    .name-container:hover .letter:not(:hover),
    .name-container:hover .dice-dot {
      opacity: 0.2;
    }

    .letter:hover {
      transform: translateY(-16px);
    }

    /* 黑点：悬浮放大 终于正常生效 */
    .dice-dot {
      width: 26px;
      height: 26px;
      background: #000;
      border-radius: 50%;
      cursor: pointer;
      z-index: 15;
    }
    .dice-dot:hover {
      transform: scale(1.3);
    }

    .name-container.fade {
      opacity: 0;
      pointer-events: none;
    }

    /* 顶部导航 */
    .top-nav {
      position: fixed;
      top: -80px;
      left: 0;
      width: 100%;
      height: 70px;
      background: rgba(255,255,255,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 42px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: top 0.45s ease;
      z-index: 100;
    }
    .top-nav.active { top: 0; }
    .top-nav a {
      text-decoration: none;
      font-size: 18px;
      color: #1a1a1a;
      font-family: system-ui;
    }
    .top-nav a:hover { color: #444; }

    /* 3D圆角骰子 */
    .dice-wrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 280px;
      height: 280px;
      perspective: 1200px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.65s cubic-bezier(0.2, 1, 0.3, 1);
      z-index: 200;
    }
    .dice-wrapper.active {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: all;
    }

    .dice {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.18s ease-out;
    }

    .dice-face {
      position: absolute;
      width: 280px;
      height: 280px;
      background: #fff;
      border: 2.5px solid #000;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
    }

    .front  { transform: rotateY(0deg) translateZ(140px); }
    .back   { transform: rotateY(180deg) translateZ(140px); }
    .right  { transform: rotateY(90deg) translateZ(140px); }
    .left   { transform: rotateY(-90deg) translateZ(140px); }
    .top    { transform: rotateX(90deg) translateZ(140px); }
    .bottom { transform: rotateX(-90deg) translateZ(140px); }
  </style>
</head>

<body>
  <!-- 顶部导航：真实页面跳转 -->
  <div class="top-nav" id="topNav">
    <a href="index.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="resume.html">Resume</a>
    <a href="experience.html">Experience</a>
    <a href="contact.html">Contact</a>
  </div>

  <div class="name-container" id="nameContainer">
    <div class="cyra">
      <span class="letter">C</span>
      <span class="letter">y</span>
      <span class="letter">r</span>
      <span class="letter">a</span>
    </div>
    <div class="dice-dot" id="diceDot"></div>
    <div class="hou">
      <span class="letter">H</span>
      <span class="letter">O</span>
      <span class="letter">U</span>
    </div>
  </div>

  <div class="dice-wrapper" id="diceWrapper">
    <div class="dice" id="dice">
      <div class="dice-face front" onclick="window.location.href='index.html'">Home</div>
      <div class="dice-face back" onclick="window.location.href='contact.html'">Contact</div>
      <div class="dice-face right" onclick="window.location.href='portfolio.html'">Portfolio</div>
      <div class="dice-face left" onclick="window.location.href='about.html'">About Me</div>
      <div class="dice-face top" onclick="window.location.href='resume.html'">Resume</div>
      <div class="dice-face bottom" onclick="window.location.href='experience.html'">Experience</div>
    </div>
  </div>

  <script>
    // 顶部导航停留不收回
    const nav = document.getElementById('topNav');
    let mouseInNav = false;
    document.addEventListener('mousemove', e => {
      if (e.clientY < 20) nav.classList.add('active');
      else if (!mouseInNav) nav.classList.remove('active');
    });
    nav.addEventListener('mouseenter', () => mouseInNav = true);
    nav.addEventListener('mouseleave', () => mouseInNav = false);

    // 点击圆点 → 名字消失 骰子出现
    const nameBox = document.getElementById('nameContainer');
    const dot = document.getElementById('diceDot');
    const diceWrap = document.getElementById('diceWrapper');

    dot.addEventListener('click', () => {
      nameBox.classList.add('fade');
      diceWrap.classList.add('active');
    });

    // 鼠标丝滑跟随骰子旋转
    let rx = 0, ry = 0;
    document.addEventListener('mousemove', e => {
      if (!diceWrap.classList.contains('active')) return;
      ry = (e.clientX / innerWidth - 0.5) * 50;
      rx = -(e.clientY / innerHeight - 0.5) * 50;
      document.getElementById('dice').style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    });

    // 点击空白返回首页
    document.addEventListener('click', e => {
      if (!diceWrap.classList.contains('active')) return;
      if (!e.target.closest('.dice')) {
        diceWrap.classList.remove('active');
        nameBox.classList.remove('fade');
      }
    });
  </script>
</body>
</html>
