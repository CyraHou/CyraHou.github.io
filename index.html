<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyra. HOU</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .name-container {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 80px;
            user-select: none;
        }

        .cyra {
            font-family: 'Lobster', cursive;
        }

        .hou {
            font-family: 'Climate Crisis', sans-serif;
        }

        .letter {
            display: inline-block;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 字母悬停效果：只作用于字母本身 */
        .name-container:hover .letter:not(:hover) {
            opacity: 0.2;
        }

        .letter:hover {
            transform: translateY(-16px);
        }

        /* ---------- 黑点 / 魔方容器 ---------- */
        .cube-dot {
            width: 26px;
            height: 26px;
            background: #000;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                        border-radius 0.3s,
                        background 0.3s;
            z-index: 15;
        }

        /* 悬停时放大，背景变透明，准备放魔方 */
        .cube-dot.active {
            transform: scale(3.2);          /* 约 83px 宽高，足够拖拽 */
            background: transparent;
            border-radius: 0;
            cursor: grab;
        }

        .cube-dot.active:active {
            cursor: grabbing;
        }

        /* 确保魔方 canvas 完全填充放大后的容器 */
        .cube-dot canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ---------- 顶部导航 ---------- */
        .top-nav {
            position: fixed;
            top: -80px;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 42px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: top 0.45s ease;
            z-index: 100;
        }

        .top-nav.active {
            top: 0;
        }

        .top-nav a {
            text-decoration: none;
            font-size: 18px;
            color: #1a1a1a;
            font-family: system-ui, sans-serif;
            transition: color 0.2s;
        }

        .top-nav a:hover {
            color: #444;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-nav" id="topNav">
        <a href="index.html">Home</a>
        <a href="about.html">About me</a>
        <a href="skills.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="others.html">Others</a>
        <a href="contact.html">Contact me</a>
    </div>

    <!-- 名字 + 黑点 -->
    <div class="name-container" id="nameContainer">
        <div class="cyra">
            <span class="letter">C</span>
            <span class="letter">y</span>
            <span class="letter">r</span>
            <span class="letter">a</span>
        </div>
        <!-- 黑点容器，初始为黑色圆点 -->
        <div class="cube-dot" id="cubeDot"></div>
        <div class="hou">
            <span class="letter">H</span>
            <span class="letter">O</span>
            <span class="letter">U</span>
        </div>
    </div>

    <!-- Three.js 传统 CDN 引入 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ========== 1. 导航栏逻辑 ==========
        (function() {
            const nav = document.getElementById('topNav');
            let mouseInNav = false;

            document.addEventListener('mousemove', function(e) {
                if (e.clientY < 20) {
                    nav.classList.add('active');
                } else if (!mouseInNav) {
                    nav.classList.remove('active');
                }
            });

            nav.addEventListener('mouseenter', function() { mouseInNav = true; });
            nav.addEventListener('mouseleave', function() {
                mouseInNav = false;
                nav.classList.remove('active');
            });
        })();

        // ========== 2. 黑点 → 魔方 交互 ==========
        (function() {
            const cubeDot = document.getElementById('cubeDot');
            let cubeActive = false;        // 魔方是否正在显示
            let animationId = null;
            let renderer = null;
            let scene = null;
            let camera = null;
            let controls = null;
            let cube = null;
            let isDragging = false;
            let moved = false;

            // 鼠标进入黑点：显示魔方
            cubeDot.addEventListener('mouseenter', function() {
                if (cubeActive) return; // 已经显示就忽略
                cubeActive = true;
                cubeDot.classList.add('active');

                // 创建 3D 场景
                scene = new THREE.Scene();
                scene.background = null;

                const size = cubeDot.clientWidth; // 取得放大后的实际尺寸（约 83px）
                camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
                camera.position.set(2.2, 1.8, 3.2);
                camera.lookAt(0, 0, 0);

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(size, size);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                cubeDot.appendChild(renderer.domElement);

                // 控制器（可拖拽旋转）
                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableZoom = false;
                controls.enablePan = false;
                controls.rotateSpeed = 0.5;
                controls.target.set(0, 0, 0);
                controls.autoRotate = true;           // 自动缓慢旋转
                controls.autoRotateSpeed = 0.8;       // 速度
                controls.update();

                // 灯光
                scene.add(new THREE.AmbientLight(0xffffff, 0.9));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(5, 10, 7);
                scene.add(dirLight);

                // 魔方几何体（六色占位）
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const colors = [
                    0xFF6B6B, 0x4ECDC4, 0xFFD93D,
                    0x6C5CE7, 0xFF8A5C, 0xA29BFE
                ];
                const materials = colors.map(c => new THREE.MeshStandardMaterial({
                    color: c,
                    roughness: 0.3,
                    metalness: 0.1,
                    emissive: new THREE.Color(c).multiplyScalar(0.15)
                }));
                cube = new THREE.Mesh(geometry, materials);
                scene.add(cube);

                // 黑色边框
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                cube.add(line);

                // 动画循环
                function animate() {
                    animationId = requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                }
                animate();

                // 监听拖拽与点击
                renderer.domElement.addEventListener('mousedown', onMouseDown);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
                // 触摸支持
                renderer.domElement.addEventListener('touchstart', onTouchStart);
                window.addEventListener('touchmove', onTouchMove);
                window.addEventListener('touchend', onTouchEnd);
            });

            // 鼠标离开黑点区域：魔方消失，恢复黑点
            cubeDot.addEventListener('mouseleave', function() {
                if (!cubeActive) return;
                cleanup();
            });

            // 清理所有 3D 资源与事件
            function cleanup() {
                if (!cubeActive) return;
                cubeActive = false;
                cubeDot.classList.remove('active');

                // 停止动画
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }

                // 移除事件监听
                if (renderer) {
                    renderer.domElement.removeEventListener('mousedown', onMouseDown);
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                    renderer.domElement.removeEventListener('touchstart', onTouchStart);
                    window.removeEventListener('touchmove', onTouchMove);
                    window.removeEventListener('touchend', onTouchEnd);
                    // 移除 canvas
                    if (renderer.domElement.parentNode === cubeDot) {
                        cubeDot.removeChild(renderer.domElement);
                    }
                    renderer.dispose();
                }

                // 释放 Three.js 对象
                if (controls) {
                    controls.dispose();
                }
                if (scene) {
                    scene.clear();
                }

                renderer = null;
                scene = null;
                camera = null;
                controls = null;
                cube = null;
                isDragging = false;
                moved = false;
            }

            // 拖拽/点击逻辑
            function onMouseDown() {
                isDragging = true;
                moved = false;
            }
            function onMouseMove() {
                if (isDragging) moved = true;
            }
            function onMouseUp() {
                if (isDragging && !moved) {
                    // 点击（非拖拽）→ 跳转
                    window.location.href = 'about.html';
                }
                isDragging = false;
            }

            function onTouchStart(e) {
                isDragging = true;
                moved = false;
            }
            function onTouchMove(e) {
                if (isDragging) moved = true;
            }
            function onTouchEnd(e) {
                if (isDragging && !moved) {
                    window.location.href = 'about.html';
                }
                isDragging = false;
            }
        })();
    </script>
</body>
</html>
