<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyra. HOU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: #ffffff;
            font-family: sans-serif;
        }

        /* ========== 开场动画覆盖层 ========== */
        #introOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }

        .skip-btn {
            position: absolute; top: 20px; right: 30px;
            font-size: 16px; color: #aaa; cursor: pointer;
            z-index: 1100; user-select: none;
            transition: color 0.2s;
        }
        .skip-btn:hover { color: #333; }

        .door-line {
            position: absolute;
            width: 1px; height: 0;
            background: #000;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            transition: height 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .peek-group {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -100%);
            display: flex; flex-direction: column; align-items: center;
            opacity: 0;
            pointer-events: none;
        }

        .peek-letter {
            font-family: 'Lobster', cursive;
            font-size: 80px;
            line-height: 1;
            color: #1a1a1a;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s;
            transform: translateY(30px);
            opacity: 0;
        }

        /* 最终首页容器（初始隐藏） */
        #mainContent {
            opacity: 0;
            transition: opacity 0.3s;
            display: flex; align-items: center; justify-content: center;
            height: 100%;
        }
        #mainContent.visible { opacity: 1; }

        .name-container {
            display: flex; align-items: center; gap: 14px;
            font-size: 80px; user-select: none;
        }

        .cyra { font-family: 'Lobster', cursive; }
        .hou  { font-family: 'Climate Crisis', sans-serif; }

        .letter {
            display: inline-block;
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1),
                        opacity 0.4s ease;
            cursor: pointer; /* 字母可点击 */
        }

        .name-container:not(.magic-active):hover .letter:not(:hover) {
            opacity: 0.2;
        }
        .name-container:not(.magic-active):hover .letter:hover {
            transform: translateY(-16px);
        }
        .name-container.magic-active .letter {
            opacity: 0; pointer-events: none;
        }

        .cube-dot {
            width: 26px; height: 26px;
            background: #000; border-radius: 50%;
            cursor: pointer; position: relative; z-index: 15;
            transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 0 0 6px transparent;
        }
        .cube-dot.active {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50vmin; height: 50vmin;
            background: transparent; border-radius: 0;
            cursor: grab; z-index: 200;
            box-shadow: 0 0 0 12px transparent;
        }
        .cube-dot.active:active { cursor: grabbing; }
        .cube-dot canvas { display: block; width: 100%; height: 100%; }

        .top-nav {
            position: fixed; top: -80px; left: 0;
            width: 100%; height: 70px;
            background: rgba(255,255,255,0.96);
            display: flex; align-items: center; justify-content: center;
            gap: 42px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: top 0.45s ease;
            z-index: 100;
        }
        .top-nav.active { top: 0; }
        .top-nav a {
            text-decoration: none; font-size: 18px;
            color: #1a1a1a; font-family: system-ui, sans-serif;
            transition: color 0.2s;
        }
        .top-nav a:hover { color: #444; }
        .cube-dot.active ~ .top-nav { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <!-- 开场动画层 -->
    <div id="introOverlay">
        <div class="skip-btn" id="skipBtn">skip</div>
        <div class="door-line" id="doorLine"></div>
        <div class="peek-group" id="peekGroup">
            <span class="peek-letter" id="peekC">c</span>
            <span class="peek-letter" id="peekY">y</span>
            <span class="peek-letter" id="peekR">r</span>
            <span class="peek-letter" id="peekA">a</span>
        </div>
    </div>

    <!-- 主内容区（隐藏） -->
    <div id="mainContent">
        <div class="top-nav" id="topNav">
            <a href="index.html">Home</a>
            <a href="about.html">About me</a>
            <a href="work-experience.html">Work Experience</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="others.html">Others</a>
            <a href="contact.html">Contact me</a>
        </div>

        <div class="name-container" id="nameContainer">
            <div class="cyra" id="cyraGroup">
                <span class="letter">C</span><span class="letter">y</span><span class="letter">r</span><span class="letter">a</span>
            </div>
            <div class="cube-dot" id="cubeDot"></div>
            <div class="hou" id="houGroup">
                <span class="letter">H</span><span class="letter">O</span><span class="letter">U</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ---------- 开场动画逻辑 ----------
        (function() {
            const overlay = document.getElementById('introOverlay');
            const skipBtn = document.getElementById('skipBtn');
            const doorLine = document.getElementById('doorLine');
            const peekGroup = document.getElementById('peekGroup');
            const peekLetters = {
                c: document.getElementById('peekC'),
                y: document.getElementById('peekY'),
                r: document.getElementById('peekR'),
                a: document.getElementById('peekA')
            };
            const mainContent = document.getElementById('mainContent');
            let animationTimer = null;

            function endIntro() {
                if (animationTimer) clearTimeout(animationTimer);
                overlay.style.display = 'none';
                mainContent.classList.add('visible');
                initCubeInteraction();
                initLetterClick();
            }

            skipBtn.addEventListener('click', endIntro);

            function startAnimation() {
                doorLine.style.height = '80px';
                setTimeout(() => {
                    doorLine.style.opacity = '0';
                    peekGroup.style.opacity = '1';

                    const order = ['c','y','r','a'];
                    let delay = 0;
                    order.forEach((char, i) => {
                        setTimeout(() => {
                            peekLetters[char].style.transform = 'translateY(0)';
                            peekLetters[char].style.opacity = '1';
                            setTimeout(() => {
                                peekLetters[char].style.transform = 'translateY(-40px)';
                            }, 150);
                        }, delay);
                        delay += 400;
                    });

                    setTimeout(() => {
                        peekGroup.style.display = 'none';
                        mainContent.classList.add('visible');
                        const cubeDot = document.getElementById('cubeDot');
                        cubeDot.style.transition = 'all 0.8s cubic-bezier(0.34,1.56,0.64,1)';
                        cubeDot.style.width = '40px';
                        cubeDot.style.height = '40px';
                        cubeDot.style.margin = '0 10px';
                        setTimeout(() => {
                            cubeDot.style.width = '26px';
                            cubeDot.style.height = '26px';
                            cubeDot.style.margin = '0';
                        }, 300);
                        setTimeout(() => {
                            initCubeInteraction();
                            initLetterClick();
                        }, 1200);
                    }, delay + 600);
                }, 600);
            }

            startAnimation();
            window.endIntro = endIntro;
        })();

        // ---------- 字母点击跳转 About me ----------
        function initLetterClick() {
            const letters = document.querySelectorAll('.letter');
            letters.forEach(letter => {
                letter.removeEventListener('click', letterClickHandler);
                letter.addEventListener('click', letterClickHandler);
            });
        }

        function letterClickHandler(e) {
            e.stopPropagation();
            window.location.href = 'about.html';
        }

        // ---------- 魔方交互（右键/双击跳转 Portfolio） ----------
        function initCubeInteraction() {
            const dot = document.getElementById('cubeDot');
            const container = document.getElementById('nameContainer');
            if (dot.dataset.initialized === 'true') return;
            dot.dataset.initialized = 'true';

            let active = false;
            let transitioning = false;
            let scene, camera, renderer, controls, animId;
            let cleanupFunc = null;

            function activate() {
                if (active || transitioning) return;
                transitioning = true;
                active = true;
                dot.classList.add('active');
                container.classList.add('magic-active');
                dot.removeEventListener('mouseleave', deactivate);
                dot.addEventListener('transitionend', onTransitionEnd, { once: true });
            }

            function deactivate() {
                if (transitioning || !active) return;
                active = false;
                dot.classList.remove('active');
                container.classList.remove('magic-active');
                destroyScene();
                dot.addEventListener('mouseleave', deactivate);
            }

            function onTransitionEnd() {
                transitioning = false;
                if (!active) return;
                const size = dot.clientWidth;
                if (size === 0) return;

                scene = new THREE.Scene();
                scene.background = null;
                camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
                camera.position.set(2.2, 1.8, 3.2);
                camera.lookAt(0,0,0);
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(size, size);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                dot.appendChild(renderer.domElement);

                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableZoom = false;
                controls.enablePan = false;
                controls.rotateSpeed = 0.5;
                controls.autoRotate = true;
                controls.autoRotateSpeed = 0.8;
                controls.target.set(0,0,0);
                controls.enableDblClick = false; // 禁用默认双击
                controls.update();

                const ambient = new THREE.AmbientLight(0xffffff, 0.9);
                const dir = new THREE.DirectionalLight(0xffffff, 0.8);
                dir.position.set(5,10,7);
                scene.add(ambient, dir);

                const geo = new THREE.BoxGeometry(1,1,1);
                const colors = [0xFF6B6B,0x4ECDC4,0xFFD93D,0x6C5CE7,0xFF8A5C,0xA29BFE];
                const materials = colors.map(c => new THREE.MeshStandardMaterial({
                    color: c, roughness: 0.3, metalness: 0.1,
                    emissive: new THREE.Color(c).multiplyScalar(0.15)
                }));
                const cubeMesh = new THREE.Mesh(geo, materials);
                scene.add(cubeMesh);
                const edges = new THREE.EdgesGeometry(geo);
                cubeMesh.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0x000000})));

                function animate() {
                    if (!active) return;
                    animId = requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                }
                animate();

                // 右键跳转 Portfolio
                function onContextMenu(e) {
                    e.preventDefault();
                    window.location.href = 'portfolio.html';
                }
                // 双击跳转 Portfolio（移动端备选）
                function onDblClick() {
                    window.location.href = 'portfolio.html';
                }

                renderer.domElement.addEventListener('contextmenu', onContextMenu);
                renderer.domElement.addEventListener('dblclick', onDblClick);

                cleanupFunc = () => {
                    try {
                        cancelAnimationFrame(animId);
                        renderer.domElement.removeEventListener('contextmenu', onContextMenu);
                        renderer.domElement.removeEventListener('dblclick', onDblClick);
                        if (renderer.domElement.parentNode) dot.removeChild(renderer.domElement);
                        renderer.dispose();
                        controls.dispose();
                        scene.clear();
                    } catch(e) {} finally {
                        scene = camera = renderer = controls = null;
                    }
                };
                dot.addEventListener('mouseleave', deactivate);
            }

            function destroyScene() {
                if (cleanupFunc) { cleanupFunc(); cleanupFunc = null; }
                dot.removeEventListener('transitionend', onTransitionEnd);
                dot.removeEventListener('mouseleave', deactivate);
            }

            dot.addEventListener('mouseenter', activate);
            dot.addEventListener('mouseleave', deactivate);
        }

        // 导航栏逻辑
        (function(){
            const nav = document.getElementById('topNav');
            let mouseInNav = false;
            document.addEventListener('mousemove', e => {
                if (e.clientY < 20) nav.classList.add('active');
                else if (!mouseInNav) nav.classList.remove('active');
            });
            nav.addEventListener('mouseenter', () => mouseInNav = true);
            nav.addEventListener('mouseleave', () => { mouseInNav = false; nav.classList.remove('active'); });
        })();
    </script>
</body>
</html>
