<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyra. HOU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: #ffffff;
            display: flex; align-items: center; justify-content: center;
        }

        .name-container {
            display: flex; align-items: center; gap: 14px;
            font-size: 80px; user-select: none;
        }

        .cyra { font-family: 'Lobster', cursive; }
        .hou  { font-family: 'Climate Crisis', sans-serif; }

        .letter {
            display: inline-block;
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1),
                        opacity 0.4s ease;
        }

        /* 鼠标悬停在名字容器上时，未悬停的字母变淡 */
        .name-container:not(.magic-active):hover .letter:not(:hover) {
            opacity: 0.2;
        }
        .name-container:not(.magic-active):hover .letter:hover {
            transform: translateY(-16px);
        }

        /* 魔方激活时字母完全隐藏 */
        .name-container.magic-active .letter {
            opacity: 0; pointer-events: none;
        }

        /* 黑点 / 魔方容器 */
        .cube-dot {
            width: 26px; height: 26px;
            background: #000; border-radius: 50%;
            cursor: pointer; position: relative; z-index: 15;
            transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
            /* 防止边缘闪烁：增加透明边框扩大感应区 */
            box-shadow: 0 0 0 6px transparent;
        }

        .cube-dot.active {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50vmin; height: 50vmin;
            background: transparent; border-radius: 0;
            cursor: grab; z-index: 200;
            box-shadow: 0 0 0 12px transparent; /* 同样扩大感应区 */
        }
        .cube-dot.active:active { cursor: grabbing; }

        .cube-dot canvas {
            display: block; width: 100%; height: 100%;
        }

        /* 顶部导航 */
        .top-nav {
            position: fixed; top: -80px; left: 0;
            width: 100%; height: 70px;
            background: rgba(255,255,255,0.96);
            display: flex; align-items: center; justify-content: center;
            gap: 42px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: top 0.45s ease;
            z-index: 100;
        }
        .top-nav.active { top: 0; }
        .top-nav a {
            text-decoration: none; font-size: 18px;
            color: #1a1a1a; font-family: system-ui, sans-serif;
            transition: color 0.2s;
        }
        .top-nav a:hover { color: #444; }

        /* 魔方激活时导航隐藏 */
        .cube-dot.active ~ .top-nav { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="top-nav" id="topNav">
        <a href="index.html">Home</a>
        <a href="about.html">About me</a>
        <a href="skills.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="others.html">Others</a>
        <a href="contact.html">Contact me</a>
    </div>

    <div class="name-container" id="nameContainer">
        <div class="cyra">
            <span class="letter">C</span><span class="letter">y</span><span class="letter">r</span><span class="letter">a</span>
        </div>
        <div class="cube-dot" id="cubeDot"></div>
        <div class="hou">
            <span class="letter">H</span><span class="letter">O</span><span class="letter">U</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 导航栏
        (function(){
            const nav = document.getElementById('topNav');
            let mouseInNav = false;
            document.addEventListener('mousemove', e => {
                if (e.clientY < 20) nav.classList.add('active');
                else if (!mouseInNav) nav.classList.remove('active');
            });
            nav.addEventListener('mouseenter', () => mouseInNav = true);
            nav.addEventListener('mouseleave', () => { mouseInNav = false; nav.classList.remove('active'); });
        })();

        // 黑点 → 魔方
        (function(){
            const dot = document.getElementById('cubeDot');
            const container = document.getElementById('nameContainer');
            let active = false;
            let transitioning = false;      // 是否正在过渡（此时忽略 mouseleave）
            let scene, camera, renderer, controls, animId;
            let cleanupFunc = null;

            // 点击/拖拽判定参数
            let startX = 0, startY = 0, startTime = 0;

            function activate() {
                if (active || transitioning) return;
                transitioning = true;
                active = true;

                dot.classList.add('active');
                container.classList.add('magic-active');

                // 在过渡期间暂时移除 mouseleave 监听，防止闪烁
                dot.removeEventListener('mouseleave', deactivate);

                // 等待过渡完成后创建魔方，并恢复 mouseleave 监听
                dot.addEventListener('transitionend', onTransitionEnd, { once: true });
            }

            function deactivate() {
                if (transitioning) return; // 过渡中不允许关闭
                if (!active) return;
                active = false;
                dot.classList.remove('active');
                container.classList.remove('magic-active');
                destroyScene();
                // 重新绑定 mouseleave（为下一次做准备）
                dot.addEventListener('mouseleave', deactivate);
            }

            function onTransitionEnd() {
                transitioning = false;
                if (!active) return; // 可能在过渡期间已经离开

                const size = dot.clientWidth;
                if (size === 0) return;

                // 创建 3D 场景
                scene = new THREE.Scene();
                scene.background = null;
                camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
                camera.position.set(2.2, 1.8, 3.2);
                camera.lookAt(0,0,0);

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(size, size);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                dot.appendChild(renderer.domElement);

                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableZoom = false;
                controls.enablePan = false;
                controls.rotateSpeed = 0.5;
                controls.autoRotate = true;
                controls.autoRotateSpeed = 0.8;
                controls.target.set(0,0,0);
                controls.update();

                const ambient = new THREE.AmbientLight(0xffffff, 0.9);
                const dir = new THREE.DirectionalLight(0xffffff, 0.8);
                dir.position.set(5,10,7);
                scene.add(ambient, dir);

                const geo = new THREE.BoxGeometry(1,1,1);
                const colors = [0xFF6B6B,0x4ECDC4,0xFFD93D,0x6C5CE7,0xFF8A5C,0xA29BFE];
                const materials = colors.map(c => new THREE.MeshStandardMaterial({
                    color: c, roughness: 0.3, metalness: 0.1,
                    emissive: new THREE.Color(c).multiplyScalar(0.15)
                }));
                const cubeMesh = new THREE.Mesh(geo, materials);
                scene.add(cubeMesh);
                const edges = new THREE.EdgesGeometry(geo);
                cubeMesh.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0x000000})));

                function animate() {
                    if (!active) return;
                    animId = requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                }
                animate();

                // 事件处理：记录起始位置和时间，用于区分点击/拖拽
                function onDown(e) {
                    const pos = e.touches ? e.touches[0] : e;
                    startX = pos.clientX;
                    startY = pos.clientY;
                    startTime = Date.now();
                }
                function onUp(e) {
                    const pos = e.changedTouches ? e.changedTouches[0] : e;
                    const dx = pos.clientX - startX;
                    const dy = pos.clientY - startY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const dt = Date.now() - startTime;
                    // 距离小于5px，时间小于400ms → 视为点击
                    if (dist < 5 && dt < 400) {
                        window.location.href = 'about.html';
                    }
                }

                renderer.domElement.addEventListener('mousedown', onDown);
                renderer.domElement.addEventListener('mouseup', onUp);
                renderer.domElement.addEventListener('touchstart', onDown, {passive: true});
                renderer.domElement.addEventListener('touchend', onUp);

                // 清理函数
                cleanupFunc = () => {
                    cancelAnimationFrame(animId);
                    renderer.domElement.removeEventListener('mousedown', onDown);
                    renderer.domElement.removeEventListener('mouseup', onUp);
                    renderer.domElement.removeEventListener('touchstart', onDown);
                    renderer.domElement.removeEventListener('touchend', onUp);
                    if (renderer.domElement.parentNode) {
                        dot.removeChild(renderer.domElement);
                    }
                    renderer.dispose();
                    controls.dispose();
                    scene.clear();
                    scene = camera = renderer = controls = null;
                };

                // 过渡完成后，现在可以安全绑定 mouseleave（允许鼠标离开关闭魔方）
                dot.addEventListener('mouseleave', deactivate);
            }

            function destroyScene() {
                if (cleanupFunc) {
                    cleanupFunc();
                    cleanupFunc = null;
                }
                dot.removeEventListener('transitionend', onTransitionEnd);
                dot.removeEventListener('mouseleave', deactivate);
            }

            // 初始绑定：鼠标进入黑点激活
            dot.addEventListener('mouseenter', activate);
            dot.addEventListener('mouseleave', deactivate);
        })();
    </script>
</body>
</html>
