<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyra. HOU</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .name-container {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 80px;
            user-select: none;
        }

        .cyra {
            font-family: 'Lobster', cursive;
        }

        .hou {
            font-family: 'Climate Crisis', sans-serif;
        }

        .letter, .cube-dot {
            display: inline-block;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 悬停逻辑：容器 hover 时，所有未被 hover 的字母和魔方都变淡 */
        .name-container .letter,
        .name-container .cube-dot {
            opacity: 1;
        }

        .name-container:hover .letter:not(:hover),
        .name-container:hover .cube-dot:not(:hover) {
            opacity: 0.2;
        }

        .letter:hover {
            transform: translateY(-16px);
        }

        /* 魔方容器 */
        .cube-dot {
            width: 30px;  /* 稍放大一点点，更好拖拽 */
            height: 30px;
            cursor: grab;
            position: relative;
        }

        .cube-dot:active {
            cursor: grabbing;
        }

        .cube-dot:hover {
            transform: scale(1.15);
        }

        .cube-dot canvas {
            display: block;
        }

        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: -80px;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 42px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: top 0.45s ease;
            z-index: 100;
        }

        .top-nav.active {
            top: 0;
        }

        .top-nav a {
            text-decoration: none;
            font-size: 18px;
            color: #1a1a1a;
            font-family: system-ui, sans-serif;
            transition: color 0.2s;
        }

        .top-nav a:hover {
            color: #444;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="top-nav" id="topNav">
        <a href="index.html">Home</a>
        <a href="about.html">About me</a>
        <a href="skills.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="others.html">Others</a>
        <a href="contact.html">Contact me</a>
    </div>

    <!-- 名字 + 魔方 -->
    <div class="name-container" id="nameContainer">
        <div class="cyra">
            <span class="letter">C</span>
            <span class="letter">y</span>
            <span class="letter">r</span>
            <span class="letter">a</span>
        </div>
        <div class="cube-dot" id="cubeDot"></div>
        <div class="hou">
            <span class="letter">H</span>
            <span class="letter">O</span>
            <span class="letter">U</span>
        </div>
    </div>

    <!-- 传统的 CDN 引入 Three.js 和 OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 导航栏逻辑（你的原有逻辑，没变）
        (function() {
            const nav = document.getElementById('topNav');
            let mouseInNav = false;

            document.addEventListener('mousemove', function(e) {
                if (e.clientY < 20) {
                    nav.classList.add('active');
                } else if (!mouseInNav) {
                    nav.classList.remove('active');
                }
            });

            nav.addEventListener('mouseenter', function() { mouseInNav = true; });
            nav.addEventListener('mouseleave', function() {
                mouseInNav = false;
                nav.classList.remove('active');
            });
        })();

        // 3D 魔方（使用全局 THREE，不再需要 import）
        (function() {
            const cubeDot = document.getElementById('cubeDot');
            const width = 30, height = 30;

            // 场景
            const scene = new THREE.Scene();
            scene.background = null;

            // 相机
            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
            camera.position.set(2.2, 1.8, 3.2);
            camera.lookAt(0, 0, 0);

            // 渲染器
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            cubeDot.appendChild(renderer.domElement);

            // 控制器（拖拽旋转）
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableZoom = false;
            controls.enablePan = false;
            controls.rotateSpeed = 0.5;
            controls.target.set(0, 0, 0);
            controls.update();

            // 灯光
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // 魔方几何体
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const colors = [
                0xFF6B6B, // 右
                0x4ECDC4, // 左
                0xFFD93D, // 上
                0x6C5CE7, // 下
                0xFF8A5C, // 前
                0xA29BFE  // 后
            ];
            const materials = colors.map(c => new THREE.MeshStandardMaterial({
                color: c,
                roughness: 0.3,
                metalness: 0.1,
                emissive: new THREE.Color(c).multiplyScalar(0.15)
            }));

            const cube = new THREE.Mesh(geometry, materials);
            scene.add(cube);

            // 边框
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
            cube.add(line);

            // 动画循环
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();

            // 点击跳转（区分拖拽与点击）
            let isDragging = false,
                moved = false;

            renderer.domElement.addEventListener('mousedown', function() {
                isDragging = true;
                moved = false;
            });
            window.addEventListener('mousemove', function() {
                if (isDragging) moved = true;
            });
            window.addEventListener('mouseup', function() {
                if (isDragging && !moved) {
                    window.location.href = 'about.html';
                }
                isDragging = false;
            });

            // 触摸支持
            renderer.domElement.addEventListener('touchstart', function(e) {
                isDragging = true;
                moved = false;
            });
            window.addEventListener('touchmove', function() {
                if (isDragging) moved = true;
            });
            window.addEventListener('touchend', function() {
                if (isDragging && !moved) {
                    window.location.href = 'about.html';
                }
                isDragging = false;
            });
        })();
    </script>
</body>
</html>
