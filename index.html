<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyra. HOU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            background: #ffffff;
            font-family: sans-serif;
        }

        /* ---------- 主内容区（一直可见，但被动画遮住） ---------- */
        #mainContent {
            position: relative;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; /* 低于动画覆盖层 */
        }

        .name-container {
            display: flex; align-items: center; gap: 14px;
            font-size: 80px; user-select: none;
        }

        .cyra { font-family: 'Lobster', cursive; }
        .hou  { font-family: 'Climate Crisis', sans-serif; }

        .letter {
            display: inline-block;
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1),
                        opacity 0.4s ease;
            cursor: pointer;
        }

        .name-container:not(.magic-active):hover .letter:not(:hover) {
            opacity: 0.2;
        }
        .name-container:not(.magic-active):hover .letter:hover {
            transform: translateY(-16px);
        }
        .name-container.magic-active .letter {
            opacity: 0; pointer-events: none;
        }

        .cube-dot {
            width: 26px; height: 26px;
            background: #000; border-radius: 50%;
            cursor: pointer; position: relative; z-index: 15;
            transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 0 0 6px transparent;
        }
        .cube-dot.active {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50vmin; height: 50vmin;
            background: transparent; border-radius: 0;
            cursor: grab; z-index: 200;
            box-shadow: 0 0 0 12px transparent;
        }
        .cube-dot.active:active { cursor: grabbing; }
        .cube-dot canvas { display: block; width: 100%; height: 100%; }

        .top-nav {
            position: fixed; top: -80px; left: 0;
            width: 100%; height: 70px;
            background: rgba(255,255,255,0.96);
            display: flex; align-items: center; justify-content: center;
            gap: 42px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: top 0.45s ease;
            z-index: 100;
        }
        .top-nav.active { top: 0; }
        .top-nav a {
            text-decoration: none; font-size: 18px;
            color: #1a1a1a; font-family: system-ui, sans-serif;
            transition: color 0.2s;
        }
        .top-nav a:hover { color: #444; }
        .cube-dot.active ~ .top-nav { opacity: 0; pointer-events: none; }

        /* ---------- 开场动画覆盖层 ---------- */
        #introOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 1000; /* 盖住主内容 */
        }

        .skip-btn {
            position: absolute; top: 20px; right: 30px;
            font-size: 16px; color: #aaa; cursor: pointer;
            z-index: 1100; user-select: none;
            transition: color 0.2s;
        }
        .skip-btn:hover { color: #333; }

        .door-line {
            position: absolute;
            left: 75%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 1px;
            height: 0;
            background: #000;
            transition: height 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 20;
        }

        .door-mask {
            position: absolute;
            left: 75%;
            top: 0;
            width: 25vw;
            height: 100%;
            background: #ffffff;
            z-index: 15;
        }

        .anim-letters {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
        }

        .anim-letter {
            position: absolute;
            font-size: 80px;
            line-height: 1;
            white-space: nowrap;
            transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                        top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                        transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.4s;
        }

        .cyra-font { font-family: 'Lobster', cursive; }
        .hou-font  { font-family: 'Climate Crisis', sans-serif; }

        .anim-dot {
            position: absolute;
            width: 26px; height: 26px;
            background: #000;
            border-radius: 50%;
            z-index: 25;
            transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                        top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                        transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body>
    <!-- 主内容区（一直存在，但被动画遮住） -->
    <div id="mainContent">
        <div class="top-nav" id="topNav">
            <a href="index.html">Home</a>
            <a href="about.html">About me</a>
            <a href="work-experience.html">Work Experience</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="others.html">Others</a>
            <a href="contact.html">Contact me</a>
        </div>

        <div class="name-container" id="nameContainer">
            <div class="cyra" id="cyraGroup">
                <span class="letter" id="letterC">C</span><span class="letter" id="letterY">y</span><span class="letter" id="letterR">r</span><span class="letter" id="letterA">a</span>
            </div>
            <div class="cube-dot" id="cubeDot"></div>
            <div class="hou" id="houGroup">
                <span class="letter" id="letterH">H</span><span class="letter" id="letterO">O</span><span class="letter" id="letterU">U</span>
            </div>
        </div>
    </div>

    <!-- 开场动画覆盖层 -->
    <div id="introOverlay">
        <div class="skip-btn" id="skipBtn">skip</div>
        <div class="door-line" id="doorLine"></div>
        <div class="door-mask" id="doorMask"></div>
        <div class="anim-letters" id="animLetters"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ========== 辅助函数 ==========
        function getElementCenter(el) {
            const rect = el.getBoundingClientRect();
            return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        }

        // ========== 魔方交互（一开始就初始化，与动画无关） ==========
        function initCubeInteraction() {
            const dot = document.getElementById('cubeDot');
            const container = document.getElementById('nameContainer');
            if (dot.dataset.initialized === 'true') return;
            dot.dataset.initialized = 'true';

            let active = false;
            let transitioning = false;
            let scene, camera, renderer, controls, animId;
            let cleanupFunc = null;

            function activate() {
                if (active || transitioning) return;
                transitioning = true;
                active = true;
                dot.classList.add('active');
                container.classList.add('magic-active');
                dot.removeEventListener('mouseleave', deactivate);
                dot.addEventListener('transitionend', onTransitionEnd, { once: true });
            }

            function deactivate() {
                if (transitioning || !active) return;
                active = false;
                dot.classList.remove('active');
                container.classList.remove('magic-active');
                destroyScene();
                dot.addEventListener('mouseleave', deactivate);
            }

            function onTransitionEnd() {
                transitioning = false;
                if (!active) return;
                let size = dot.clientWidth;
                if (size < 50) {
                    const vmin = Math.min(window.innerWidth, window.innerHeight);
                    size = vmin * 0.5;
                }

                scene = new THREE.Scene();
                scene.background = null;
                camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
                camera.position.set(2.2, 1.8, 3.2);
                camera.lookAt(0,0,0);
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(size, size);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                dot.appendChild(renderer.domElement);

                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableZoom = false;
                controls.enablePan = false;
                controls.rotateSpeed = 0.5;
                controls.autoRotate = true;
                controls.autoRotateSpeed = 0.8;
                controls.target.set(0,0,0);
                controls.enableDblClick = false;
                controls.update();

                const ambient = new THREE.AmbientLight(0xffffff, 0.9);
                const dir = new THREE.DirectionalLight(0xffffff, 0.8);
                dir.position.set(5,10,7);
                scene.add(ambient, dir);

                const geo = new THREE.BoxGeometry(1,1,1);
                const colors = [0xFF6B6B,0x4ECDC4,0xFFD93D,0x6C5CE7,0xFF8A5C,0xA29BFE];
                const materials = colors.map(c => new THREE.MeshStandardMaterial({
                    color: c, roughness: 0.3, metalness: 0.1,
                    emissive: new THREE.Color(c).multiplyScalar(0.15)
                }));
                const cubeMesh = new THREE.Mesh(geo, materials);
                scene.add(cubeMesh);
                const edges = new THREE.EdgesGeometry(geo);
                cubeMesh.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0x000000})));

                function animate() {
                    if (!active) return;
                    animId = requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                }
                animate();

                function onContextMenu(e) {
                    e.preventDefault();
                    window.location.href = 'portfolio.html';
                }
                function onDblClick() {
                    window.location.href = 'portfolio.html';
                }

                renderer.domElement.addEventListener('contextmenu', onContextMenu);
                renderer.domElement.addEventListener('dblclick', onDblClick);

                cleanupFunc = () => {
                    try {
                        cancelAnimationFrame(animId);
                        renderer.domElement.removeEventListener('contextmenu', onContextMenu);
                        renderer.domElement.removeEventListener('dblclick', onDblClick);
                        if (renderer.domElement.parentNode) dot.removeChild(renderer.domElement);
                        renderer.dispose();
                        controls.dispose();
                        scene.clear();
                    } catch(e) {} finally {
                        scene = camera = renderer = controls = null;
                    }
                };
                dot.addEventListener('mouseleave', deactivate);
            }

            function destroyScene() {
                if (cleanupFunc) { cleanupFunc(); cleanupFunc = null; }
                dot.removeEventListener('transitionend', onTransitionEnd);
                dot.removeEventListener('mouseleave', deactivate);
            }

            dot.addEventListener('mouseenter', activate);
            dot.addEventListener('mouseleave', deactivate);
        }

        // ========== 字母点击跳转 About me（一开始就绑定） ==========
        function initLetterClick() {
            const letters = document.querySelectorAll('.letter');
            letters.forEach(letter => {
                letter.removeEventListener('click', letterClickHandler);
                letter.addEventListener('click', letterClickHandler);
            });
        }

        function letterClickHandler(e) {
            e.stopPropagation();
            window.location.href = 'about.html';
        }

        // ========== 导航栏逻辑 ==========
        (function(){
            const nav = document.getElementById('topNav');
            let mouseInNav = false;
            document.addEventListener('mousemove', e => {
                if (e.clientY < 20) nav.classList.add('active');
                else if (!mouseInNav) nav.classList.remove('active');
            });
            nav.addEventListener('mouseenter', () => mouseInNav = true);
            nav.addEventListener('mouseleave', () => { mouseInNav = false; nav.classList.remove('active'); });
        })();

        // ========== 开场动画（完全独立，不影响主内容） ==========
        (function() {
            const overlay = document.getElementById('introOverlay');
            const skipBtn = document.getElementById('skipBtn');
            const doorLine = document.getElementById('doorLine');
            const doorMask = document.getElementById('doorMask');
            const animContainer = document.getElementById('animLetters');

            let bPositions = {};
            let commonY = 0;

            // 读取主内容字母和黑点的坐标（此时主内容已完全渲染）
            function captureBPositions() {
                const cyraLetters = [
                    document.getElementById('letterC'),
                    document.getElementById('letterY'),
                    document.getElementById('letterR'),
                    document.getElementById('letterA')
                ];
                const houLetters = [
                    document.getElementById('letterH'),
                    document.getElementById('letterO'),
                    document.getElementById('letterU')
                ];
                const cubeDot = document.getElementById('cubeDot');

                const cCenter = getElementCenter(cyraLetters[0]);
                commonY = cCenter.y;

                cyraLetters.forEach((el, i) => {
                    const center = getElementCenter(el);
                    bPositions[`cyra${i}`] = { x: center.x, y: commonY };
                });
                houLetters.forEach((el, i) => {
                    const center = getElementCenter(el);
                    bPositions[`hou${i}`] = { x: center.x, y: commonY };
                });
                const dotCenter = getElementCenter(cubeDot);
                bPositions.dot = { x: dotCenter.x, y: commonY };
            }

            function endIntro() {
                if (introTimer) clearTimeout(introTimer);
                animContainer.innerHTML = '';
                overlay.style.display = 'none'; // 露出主内容
            }

            skipBtn.addEventListener('click', endIntro);

            let introTimer = null;

            function startAnimation() {
                captureBPositions();

                doorLine.style.height = '320px'; // 竖线从无到有

                setTimeout(() => {
                    const cyraData = [
                        { char: 'c', font: 'cyra-font', id: 'cyra0' },
                        { char: 'y', font: 'cyra-font', id: 'cyra1' },
                        { char: 'r', font: 'cyra-font', id: 'cyra2' },
                        { char: 'a', font: 'cyra-font', id: 'cyra3' }
                    ];
                    const houData = [
                        { char: 'H', font: 'hou-font', id: 'hou0' },
                        { char: 'O', font: 'hou-font', id: 'hou1' },
                        { char: 'U', font: 'hou-font', id: 'hou2' }
                    ];

                    const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

                    // 创建 cyra 字母（从下往上探头：c在最下）
                    const cyraEls = cyraData.map((data, i) => {
                        const el = document.createElement('span');
                        el.className = `anim-letter ${data.font}`;
                        el.textContent = data.char;
                        const offset = (1.5 - i) * 80;
                        el.style.top = `calc(50% + ${offset}px)`;
                        el.style.left = '75%';
                        el.style.transform = 'translateX(30px)';
                        el.style.opacity = '0';
                        el.dataset.id = data.id;
                        animContainer.appendChild(el);
                        return el;
                    });

                    // 创建 HOU 字母（横向排列）
                    const houEls = houData.map((data, i) => {
                        const el = document.createElement('span');
                        el.className = `anim-letter ${data.font}`;
                        el.textContent = data.char;
                        el.style.top = 'calc(50% - 40px)';
                        el.style.left = '75%';
                        el.style.transform = `translateX(${30 + i * 50}px)`;
                        el.style.opacity = '0';
                        el.dataset.id = data.id;
                        animContainer.appendChild(el);
                        return el;
                    });

                    // 黑点
                    const dotEl = document.createElement('div');
                    dotEl.className = 'anim-dot';
                    dotEl.style.top = '50%';
                    dotEl.style.left = '75%';
                    dotEl.style.transform = 'translate(-50%, -50%) scale(0)';
                    animContainer.appendChild(dotEl);

                    async function peekCyra() {
                        for (let i = 0; i < 4; i++) {
                            const el = cyraEls[i];
                            el.style.opacity = '1';
                            const halfWidth = el.offsetWidth / 2;
                            el.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                            el.style.transform = `translateX(-${halfWidth}px) rotate(-60deg)`;
                            await delay(400);
                        }
                    }

                    async function jumpCyra() {
                        for (let i = 0; i < 4; i++) {
                            const el = cyraEls[i];
                            const target = bPositions[`cyra${i}`];
                            el.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                            el.style.transform = 'rotate(0deg)';
                            el.style.left = target.x + 'px';
                            el.style.top = target.y + 'px';
                            await delay(300);
                        }
                    }

                    async function jumpHou() {
                        for (let el of houEls) {
                            el.style.opacity = '1';
                            el.style.transition = 'transform 0.6s ease';
                            el.style.transform = 'translateX(-80px)';
                        }
                        await delay(400);
                        for (let i = 0; i < 3; i++) {
                            const el = houEls[i];
                            const target = bPositions[`hou${i}`];
                            el.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                            el.style.left = target.x + 'px';
                            el.style.top = target.y + 'px';
                            el.style.transform = 'rotate(0deg)';
                        }
                        await delay(600);
                    }

                    async function finalPush() {
                        dotEl.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                        dotEl.style.left = bPositions.dot.x + 'px';
                        dotEl.style.top = bPositions.dot.y + 'px';
                        dotEl.style.transform = 'translate(-50%, -50%) scale(1)';

                        for (let i = 0; i < 4; i++) {
                            const el = cyraEls[i];
                            el.style.left = (parseFloat(el.style.left) - 10) + 'px';
                        }
                        for (let i = 0; i < 3; i++) {
                            const el = houEls[i];
                            el.style.left = (parseFloat(el.style.left) + 10) + 'px';
                        }

                        doorLine.style.opacity = '0';
                        doorMask.style.opacity = '0';
                        await delay(500);
                        endIntro();
                    }

                    (async () => {
                        await peekCyra();
                        await delay(200);
                        await jumpCyra();
                        await delay(100);
                        await jumpHou();
                        await delay(200);
                        await finalPush();
                    })();
                }, 1000);
            }

            // 页面加载完成后启动动画（此时主内容已渲染，坐标可读）
            window.addEventListener('load', () => {
                initCubeInteraction();   // 魔方早早初始化
                initLetterClick();       // 字母点击早早绑定
                requestAnimationFrame(() => {
                    startAnimation();
                });
            });
        })();
    </script>
</body>
</html>
