<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat API Test</title>
</head>
<body>
    <h1>Chat API Test</h1>
    <button onclick="testChat()">Send Test Message</button>
    <pre id="result"></pre>
    <script>
        async function testChat() {
            const res = document.getElementById('result');
            res.textContent = 'Testing...';
            try {
                const response = await fetch('https://cyra-hou-github-io.vercel.app/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: '你好', user: 'test' })
                });
                const data = await response.json();
                res.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                res.textContent = 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
